name: 🔍 葡萄词库周五巡逻

on:
  schedule:
    # 每周五北京时间 10:00 = UTC 周五 02:00
    - cron: '0 2 * * 5'
  workflow_dispatch: {}

jobs:
  weekly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: 扫描新词
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET:  ${{ secrets.DINGTALK_SECRET }}
          GITHUB_TOKEN:     ${{ secrets.GRAPE_DATA_TOKEN }}
        run: python weekly_scan.py
